<style>
:root{
  --purple:#7c3aed;
  --purple2:#a855f7;
  --cyan:#22d3ee;
  --card:rgba(15,23,42,0.85);
  --border:rgba(255,255,255,0.12);
  --text:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  background:#000 !important;
}

/* Absolute black kill-floor behind everything */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:#000;
  z-index:-100;
}

/* ================= VIDEO BACKGROUND ================= */
#bg-video{
  position:fixed;
  top:0; left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  object-position:center center;
  z-index:-10;
  background:#000;
  filter:contrast(1.2) brightness(0.85) saturate(1.3);
  opacity:1;
  transition:opacity 0.6s ease;
}

/* ================= OVERLAY ================= */
.topo-overlay{
  position:fixed;
  inset:0;
  z-index:-9;
  pointer-events:none;
  background:
    radial-gradient(circle at 30% 40%, rgba(168,85,247,0.2), transparent 55%),
    radial-gradient(circle at 70% 60%, rgba(124,58,237,0.18), transparent 55%),
    linear-gradient(180deg, rgba(10,10,20,0.25), rgba(5,5,15,0.9));
}

body{
  font-family:'Segoe UI',sans-serif;
  color:var(--text);
  opacity:1;
}

/* ================= TOP BAR ================= */
.top-bar{
  position:fixed;
  top:0; left:0; right:0;
  padding:1rem 2.2rem;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:space-between;
  backdrop-filter:blur(6px) saturate(140%);
  background:rgba(10,10,25,0.35);
  border-bottom:1px solid rgba(168,85,247,0.35);
  transition:transform 0.35s ease, opacity 0.35s ease;
}

.top-bar.hidden{
  transform:translateY(-100%);
  opacity:0;
  pointer-events:none;
}

.top-bar-logo{
  width:46px;
  height:46px;
  display:block;
  flex-shrink:0;
  background:transparent;
}

/* ================= TOP BAR NAV ================= */
.top-bar-nav{
  display:flex;
  align-items:center;
  gap:8px;
}

.nav-tab{
  font-family:'Amatic SC',cursive;
  font-size:1.4rem;
  color:rgba(196,181,253,0.75);
  background:none;
  border:none;
  cursor:pointer;
  padding:5px 14px;
  border-radius:8px;
  transition:color 0.2s, background 0.2s;
  display:flex;
  align-items:center;
  gap:6px;
}

.nav-tab:hover{
  color:#c4b5fd;
  background:rgba(168,85,247,0.15);
}

.nav-tab.active{
  color:#fff;
  background:rgba(168,85,247,0.25);
  border:1px solid rgba(168,85,247,0.4);
}

/* ================= SETTINGS BUTTON ================= */
.settings-btn{
  font-family:'Amatic SC',cursive;
  font-size:1.5rem;
  color:rgba(196,181,253,0.75);
  background:none;
  border:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:7px;
  padding:4px 12px;
  border-radius:8px;
  transition:color 0.2s, background 0.2s;
}

.settings-btn:hover{
  color:#c4b5fd;
  background:rgba(168,85,247,0.15);
}

.settings-btn svg{
  width:17px;
  height:17px;
  transition:transform 0.5s ease;
}

.settings-btn:hover svg{ transform:rotate(60deg); }

/* ================= SETTINGS OVERLAY ================= */
#settingsOverlay{
  position:fixed;
  inset:0;
  z-index:500;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.3s ease;
}

#settingsOverlay.open{
  opacity:1;
  pointer-events:all;
}

.settings-backdrop{
  position:absolute;
  inset:0;
  background:rgba(5,3,15,0.78);
  backdrop-filter:blur(14px);
}

.settings-panel{
  position:relative;
  z-index:1;
  width:min(92vw, 600px);
  max-height:88vh;
  display:flex;
  flex-direction:column;
  background:rgba(12,8,28,0.97);
  border:1px solid rgba(168,85,247,0.4);
  border-radius:22px;
  box-shadow:
    0 0 70px rgba(124,58,237,0.4),
    0 0 140px rgba(168,85,247,0.15),
    inset 0 1px 0 rgba(255,255,255,0.07);
  transform:translateY(28px) scale(0.97);
  transition:transform 0.4s cubic-bezier(0.34,1.5,0.64,1);
  overflow:hidden;
}

#settingsOverlay.open .settings-panel{
  transform:translateY(0) scale(1);
}

.sp-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:1.5rem 1.8rem 1.1rem;
  border-bottom:1px solid rgba(168,85,247,0.18);
}

.sp-title{
  font-family:'Amatic SC',cursive;
  font-size:2.4rem;
  background:linear-gradient(90deg,#ede9fe,#c4b5fd,#a855f7);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.sp-close{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  color:rgba(196,181,253,0.65);
  width:34px; height:34px;
  border-radius:50%;
  font-size:1.1rem;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background 0.2s, color 0.2s;
}

.sp-close:hover{ background:rgba(168,85,247,0.25); color:#fff; }

.sp-body{ padding:1.6rem 1.8rem 2rem; overflow-y:auto; flex:1; }

.sp-section-label{
  font-family:'Amatic SC',cursive;
  font-size:1.25rem;
  color:rgba(196,181,253,0.45);
  letter-spacing:0.1em;
  text-transform:uppercase;
  margin-bottom:1rem;
}

.cloak-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-bottom:1.4rem;
}

.cloak-card{
  background:rgba(255,255,255,0.03);
  border:2px solid rgba(255,255,255,0.07);
  border-radius:14px;
  padding:1rem 0.8rem;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  transition:border-color 0.2s, background 0.2s, transform 0.15s;
  text-align:center;
}

.cloak-card:hover{
  background:rgba(168,85,247,0.08);
  border-color:rgba(168,85,247,0.4);
  transform:translateY(-2px);
}

.cloak-card.active{
  border-color:#a855f7;
  background:rgba(168,85,247,0.12);
  box-shadow:0 0 18px rgba(168,85,247,0.25);
}

.cloak-card img{
  width:36px; height:36px;
  object-fit:contain;
  border-radius:6px;
}

.cloak-card-name{
  font-size:0.78rem;
  font-weight:500;
  color:#c4b5fd;
  line-height:1.3;
}

.cloak-card-title{
  font-family:'Amatic SC',cursive;
  font-size:1rem;
  color:rgba(196,181,253,0.5);
  line-height:1.2;
}

.cloak-apply{
  width:100%;
  padding:0.85rem;
  background:linear-gradient(90deg,#7c3aed,#a855f7);
  border:none;
  border-radius:12px;
  color:#fff;
  font-family:'Amatic SC',cursive;
  font-size:1.5rem;
  cursor:pointer;
  letter-spacing:0.05em;
  transition:opacity 0.2s, transform 0.15s;
  box-shadow:0 0 20px rgba(168,85,247,0.4);
}

.cloak-apply:hover{ opacity:0.88; transform:translateY(-1px); }
.cloak-apply:active{ transform:translateY(0); }

.cloak-status{
  font-family:'Amatic SC',cursive;
  font-size:1.1rem;
  color:rgba(196,181,253,0.45);
  text-align:center;
  margin-top:0.9rem;
}

/* ================= BG PICKER ================= */
.bg-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:1rem;
}

.bg-card{
  background:rgba(255,255,255,0.03);
  border:2px solid rgba(255,255,255,0.07);
  border-radius:12px;
  padding:0.75rem 0.5rem;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  transition:border-color 0.2s, background 0.2s, transform 0.15s;
  text-align:center;
}

.bg-card:hover{
  background:rgba(168,85,247,0.08);
  border-color:rgba(168,85,247,0.4);
  transform:translateY(-2px);
}

.bg-card.active{
  border-color:#a855f7;
  background:rgba(168,85,247,0.12);
  box-shadow:0 0 16px rgba(168,85,247,0.25);
}

.bg-card-icon{
  font-size:1.6rem;
  line-height:1;
}

.bg-card-name{
  font-family:'Amatic SC',cursive;
  font-size:1rem;
  color:#c4b5fd;
  line-height:1.2;
}

/* ================= LAYOUT ================= */
main{
  position:relative;
  z-index:10;
  padding:7.5rem 1.5rem 3rem;
  max-width:1200px;
  margin:auto;
  text-align:center;
  background:transparent;
}

/* ================= HERO ================= */
.hero-wrapper{margin-bottom:3rem;}

.hero-title{
  display:none;
}

.hero-logo-svg{
  display:block;
  margin:0 auto;
  width:clamp(340px,82vw,860px);
  height:auto;
  overflow:visible;
  animation:logoPulse 4s ease-in-out infinite;
}

@keyframes logoPulse{
  0%,100%{ opacity:1; }
  50%{ opacity:0.82; }
}



/* ================= SEARCH ================= */
.search-container{
  max-width:620px;
  margin:0 auto 3.5rem;
  position:relative;
}

/* Animated rotating gradient glow bloom */
.search-container::before{
  content:"";
  position:absolute;
  inset:-4px;
  border-radius:20px;
  background:linear-gradient(var(--sg-angle,120deg),
    #4c1d95,#7c3aed,#a855f7,#c084fc,#a855f7,#7c3aed,#4c1d95);
  background-size:300% 300%;
  filter:blur(18px);
  opacity:0.8;
  z-index:-2;
  animation:searchSpin 4s linear infinite;
}

/* Crisp glowing border ring on top */
.search-container::after{
  content:"";
  position:absolute;
  inset:-1.5px;
  border-radius:19px;
  background:linear-gradient(120deg,
    rgba(168,85,247,0.9),
    rgba(196,132,252,0.6),
    rgba(124,58,237,0.9),
    rgba(196,132,252,0.6),
    rgba(168,85,247,0.9));
  background-size:300% 300%;
  animation:searchBorderShift 3s ease infinite;
  z-index:-1;
  border-radius:19px;
}

@keyframes searchSpin{
  0%  { background-position:0% 50%;   }
  50% { background-position:100% 50%; }
  100%{ background-position:0% 50%;   }
}

@keyframes searchBorderShift{
  0%,100%{ background-position:0% 50%;   }
  50%     { background-position:100% 50%; }
}

#searchBar{
  position:relative;
  z-index:1;
  width:100%;
  padding:1.3rem 1.6rem;
  border-radius:18px;
  border:1px solid rgba(168,85,247,0.35);
  background:rgba(8,4,22,0.82);
  backdrop-filter:blur(20px) saturate(180%);
  color:white;
  font-size:1.05rem;
  outline:none;
  box-shadow:inset 0 0 28px rgba(124,58,237,0.18), inset 0 1px 0 rgba(255,255,255,0.06);
  transition:border-color 0.25s, box-shadow 0.25s;
}

#searchBar:focus{
  border-color:rgba(168,85,247,0.7);
  box-shadow:inset 0 0 38px rgba(124,58,237,0.28), inset 0 1px 0 rgba(255,255,255,0.08), 0 0 20px rgba(168,85,247,0.3);
}

#searchBar::placeholder{ color:rgba(196,181,253,0.4); }

/* ================= GRID ================= */
.zone-container{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:20px;
}

.zone-item{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.35s ease;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:80px;
  padding:1.2rem 1rem;
}

.zone-item:hover{
  transform:translateY(-6px) scale(1.03);
  border-color:var(--purple2);
  box-shadow:0 0 35px rgba(168,85,247,0.45);
}

.zone-item button{
  background:none;
  border:none;
  color:white;
  font-weight:bold;
  font-size:0.95rem;
  width:100%;
  cursor:pointer;
  font-family:'Segoe UI',sans-serif;
  line-height:1.3;
  text-align:center;
}

/* ================= VIEWER ================= */
#zoneViewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  flex-direction:column;
  z-index:999;
}

.zone-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0.7rem 1rem;
  background:rgba(15,23,42,0.95);
}

.zone-controls{display:flex;gap:10px;}

.zone-controls button{
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  color:white;
  padding:0.4rem 0.8rem;
  border-radius:6px;
  cursor:pointer;
}

#zoneFrame{
  flex-grow:1;
  border:none;
  width:100%;
}

/* ================= PROXY PAGE ================= */
#proxyPage{
  display:none;
  position:fixed;
  inset:0;
  z-index:200;
  flex-direction:column;
}

.proxy-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0.8rem 1.5rem;
  background:rgba(10,10,25,0.9);
  border-bottom:1px solid rgba(168,85,247,0.35);
  backdrop-filter:blur(10px);
  flex-shrink:0;
}

.proxy-title{
  font-family:'Amatic SC',cursive;
  font-size:1.8rem;
  background:linear-gradient(90deg,#ede9fe,#c4b5fd,#a855f7);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.proxy-header-controls{
  display:flex;
  gap:10px;
}

.proxy-btn{
  font-family:'Amatic SC',cursive;
  font-size:1.3rem;
  background:rgba(168,85,247,0.15);
  border:1px solid rgba(168,85,247,0.35);
  color:#c4b5fd;
  padding:5px 16px;
  border-radius:8px;
  cursor:pointer;
  transition:background 0.2s, color 0.2s;
}

.proxy-btn:hover{
  background:rgba(168,85,247,0.3);
  color:#fff;
}

#proxyFrame{
  flex-grow:1;
  border:none;
  width:100%;
  height:100%;
}

/* ================= LOADER ================= */
#void-loader{
  position:fixed;
  inset:0;
  z-index:9999;
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2.5rem;
  transition:opacity 0.9s ease;
}

#void-loader.fade-out{
  opacity:0;
  pointer-events:none;
}

.loader-logo{
  width:clamp(80px,15vw,130px);
  height:auto;
  animation:loaderPulse 2s ease-in-out infinite;
}

@keyframes loaderPulse{
  0%,100%{ filter: drop-shadow(0 0 14px rgba(138,43,226,0.9)) drop-shadow(0 0 35px rgba(100,0,200,0.6)); opacity:0.85; }
  50%{ filter: drop-shadow(0 0 28px rgba(160,60,255,1)) drop-shadow(0 0 60px rgba(130,0,230,0.8)); opacity:1; }
}

.loader-bar-wrap{
  width:clamp(180px,30vw,280px);
  height:3px;
  background:rgba(168,85,247,0.12);
  border-radius:99px;
  overflow:hidden;
}

.loader-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg, #7c3aed, #c084fc, #7c3aed);
  background-size:200% 100%;
  border-radius:99px;
  animation:barFill 2.2s cubic-bezier(0.4,0,0.2,1) forwards,
            barShimmer 1.2s linear infinite;
}

@keyframes barFill{
  0%  { width:0%;   }
  60% { width:75%;  }
  85% { width:90%;  }
  100%{ width:100%; }
}

@keyframes barShimmer{
  0%  { background-position:200% 0; }
  100%{ background-position:-200% 0; }
}

.loader-text{
  font-family:'Amatic SC',cursive;
  font-size:1.15rem;
  color:rgba(196,181,253,0.45);
  letter-spacing:0.25em;
  text-transform:uppercase;
  animation:loaderTextPulse 1.8s ease-in-out infinite;
}

@keyframes loaderTextPulse{
  0%,100%{ opacity:0.45; }
  50%{ opacity:0.75; }
}

      <button onclick="aboutBlank()">Open in Tab</button>
      <button onclick="closeZone()">Close</button>
    </div>
  </div>
  <iframe id="zoneFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-orientation-lock allow-pointer-lock"></iframe>
</div>

<script>
const DEP_URL = "https://raw.githubusercontent.com/SchoolgyGames/SchoolgyDepenencies/main";

/* ========== BACKGROUNDS ========== */
const BG_BASE = "https://raw.githubusercontent.com/SchoolgyGames/Void-Dependencies/main/bg/";

const backgrounds = [
  { id:"firewatch", name:"Firewatch Night",  icon:"🔥", file:"firewatch-purple-night.1920x1080 (1).mp4" },
  { id:"moon",      name:"Moon at Night",    icon:"🌙", file:"moon-at-night.3840x2160.mp4" },
  { id:"neon",      name:"Neon Reflections", icon:"💜", file:"neon-reflections.3840x2160.mp4" },
  { id:"knight",    name:"Purple Knight",    icon:"⚔️", file:"purple-knight.3840x2160.mp4" },
  { id:"sky",       name:"Purple Sky",       icon:"🌌", file:"purple-sky.3840x2160.mp4" },
  { id:"samurai",   name:"Samurai City",     icon:"🏙️", file:"samurai-in-night-city.mp4" },
];

let selectedBg = null;
let activeBgId = null;

function initBackground(){
  const last = localStorage.getItem('voidLastBg');
  const pool = backgrounds.filter(b => b.id !== last);
  const rand = pool.length ? pool[Math.floor(Math.random() * pool.length)] : backgrounds[0];

  activeBgId = rand.id;
  selectedBg = rand.id;
  try{ localStorage.setItem('voidLastBg', rand.id); }catch(e){}

  const vid = document.getElementById('bg-video');
  vid.src = BG_BASE + encodeURIComponent(rand.file).replace(/%20/g, ' ');
  vid.muted = true;
  vid.loop = true;
  vid.load();
  vid.play().catch(()=>{});

  let dismissed = false;
  function dismiss(){
    if(dismissed) return;
    dismissed = true;
    const loader = document.getElementById('void-loader');
    if(loader){ loader.classList.add('fade-out'); setTimeout(()=>{ loader.style.display='none'; }, 950); }
  }
  vid.addEventListener('canplay', dismiss, { once: true });
  setTimeout(dismiss, 4000);

  buildBgGrid();
}

function setBackground(id, instant){
  const bg = backgrounds.find(b => b.id === id);
  if(!bg) return;
  activeBgId = id;
  selectedBg = id;
  try{ localStorage.setItem('voidLastBg', id); }catch(e){}
  const vid = document.getElementById('bg-video');
  const doSwitch = () => {
    vid.src = BG_BASE + bg.file;
    vid.muted = true;
    vid.loop = true;
    vid.load();
    vid.addEventListener('canplay', () => {
      vid.play().catch(()=>{});
      vid.style.opacity = '1';
    }, { once: true });
    setTimeout(() => { vid.style.opacity = '1'; }, 800);
  };
  if(instant){
    doSwitch();
  } else {
    vid.style.opacity = '0';
    setTimeout(doSwitch, 350);
  }
  // Highlight active card
  document.querySelectorAll('.bg-card').forEach(c => {
    c.classList.toggle('active', c.dataset.bgId === id);
  });
  document.getElementById('bgStatus').textContent = '✓ Background: ' + bg.name;
}

function selectBg(id){
  selectedBg = id;
  document.querySelectorAll('.bg-card').forEach(c => {
    c.classList.toggle('active', c.dataset.bgId === id);
  });
  const bg = backgrounds.find(b => b.id === id);
  document.getElementById('bgStatus').textContent = 'Selected: ' + bg.name;
}

function applyBackground(){
  if(!selectedBg){
    document.getElementById('bgStatus').textContent = '⚠ Pick a background first!';
    return;
  }
  setBackground(selectedBg);
}

function buildBgGrid(){
  const grid = document.getElementById('bgGrid');
  if(!grid) return;
  grid.innerHTML = '';
  backgrounds.forEach(bg => {
    const card = document.createElement('div');
    card.className = 'bg-card' + (bg.id === activeBgId ? ' active' : '');
    card.dataset.bgId = bg.id;
    card.onclick = () => selectBg(bg.id);
    card.innerHTML = `<span class="bg-card-icon">${bg.icon}</span><span class="bg-card-name">${bg.name}</span>`;
    grid.appendChild(card);
  });
}

const rawFiles = [];

(function(){
  const _unused_α = [0x3E,0x5B,0x11,0x7A,0xC2,0x44,0x89,0xF1,0x2D,0x96,0x50,0x73];
  void _unused_α;
})();

const __cfg_renderTimeout  = [0x4F, 0x2A, 0x7E];
const __cfg_tileSize        = [0x13, 0x91, 0xBC];
const __cfg_maxRetries      = [0x55, 0xD7, 0x38];
const __cfg_assetRevision   = [0xE4, 0x6C, 0x19];

const __cfg_legacyCompat = [0x1F,0x4C,0x88,0xA3,0x27,0xE0,0x69,0x3B,0xD5,0x74,0xAE,0x52];
void __cfg_legacyCompat;

const __ρ = "MDMxOTMwN2ZmM2ZiMzk5MDc0YjIyMjUxMTk3OTQ3N2ZmM2ZiMzliYTYyYjMxNDc3MmQ0NzEyNjlkZGU0MWJiOTVjYjc1NTYzMmQ2ZDM0N2FmNWViMWNhMTU5YTMwZjZmMmI2ZDI4NjZkZGQyMWZlNTU5YjMxNDc1MTU2MjMwNjJkZGQxNjBiYzYxOWQ1NDZmMDA0NDMwNjRmNWY0MDdiOA==";

let __resolveAssetRoot = (function(){
  let _resolved = null;
  return function() {
    if (_resolved) return _resolved;
    const _k = [...__cfg_renderTimeout, ...__cfg_tileSize, ...__cfg_maxRetries, ...__cfg_assetRevision];
    const _h = atob(__ρ);
    const _b = [];
    for (let i = 0; i < _h.length; i += 2) _b.push(parseInt(_h[i] + _h[i+1], 16));
    let _s = '';
    for (let i = 0; i < _b.length; i++) _s += String.fromCharCode(_b[i] ^ _k[i % _k.length]);
    const _r = atob(_s);
    _resolved = _r.split('').reverse().join('');
    _k.fill(0);
    __resolveAssetRoot = () => _resolved;
    return _resolved;
  };
})();

function removeCLPrefix(name) {
  if (name.toLowerCase().startsWith('cl')) return name.substring(2);
  return name;
}

function formatGameName(name) {
  let f = removeCLPrefix(name);
  f = f.replace(/([A-Z])/g, ' $1');
  f = f.replace(/([0-9]+)/g, ' $1');
  f = f.replace(/\s+/g, ' ').trim();
  if (f.length > 0) f = f.charAt(0).toUpperCase() + f.slice(1);
  return f || name;
}

function normalizeFileName(name) {
  if (name.includes('.') && name.lastIndexOf('.') > 0) return name;
  return name + '.html';
}

let allGames = rawFiles
  .map(f => ({ filename: f, displayName: formatGameName(f) }))
  .sort((a, b) => a.displayName.localeCompare(b.displayName));

let filteredGames = [...allGames];

function showTab(tab){
  const gamesPage = document.getElementById('gamesPage');
  const proxyPage = document.getElementById('proxyPage');
  const tabGames  = document.getElementById('tab-games');
  const tabProxy  = document.getElementById('tab-proxy');

  if(tab === 'games'){
    gamesPage.style.display = 'block';
    proxyPage.style.display = 'none';
    tabGames.classList.add('active');
    tabProxy.classList.remove('active');
  } else {
    gamesPage.style.display = 'none';
    proxyPage.style.display = 'flex';
    tabProxy.classList.add('active');
    tabGames.classList.remove('active');
  }
}

const DEP_URL2 = "https://raw.githubusercontent.com/SchoolgyGames/Void-Dependencies/main/favicons";
const cloaks = {
  clever:    { title:"Clever | Portal",  icon: DEP_URL2 + "/clever.png"    },
  ixl:       { title:"IXL | Dashboard",  icon: DEP_URL2 + "/ixl.png"       },
  schoology: { title:"Schoology | Home", icon: DEP_URL2 + "/schoology.png" }
};

let selectedCloak = null;

const cloakKeys = Object.keys(cloaks);
setTimeout(() => applySpecificCloak(cloakKeys[Math.floor(Math.random() * cloakKeys.length)]), 1500);

function selectCloak(key){
  selectedCloak = key;
  document.querySelectorAll('.cloak-card').forEach(c => c.classList.remove('active'));
  document.getElementById('cloak-' + key).classList.add('active');
  document.getElementById('cloakStatus').textContent = 'Selected: ' + cloaks[key].title;
}

function applyCloak(){
  if(!selectedCloak){
    document.getElementById('cloakStatus').textContent = '⚠ Pick a cloak first!';
    return;
  }
  applySpecificCloak(selectedCloak);
  document.getElementById('cloakStatus').textContent = '✓ Cloak applied: ' + cloaks[selectedCloak].title;
}

function applySpecificCloak(key){
  const c = cloaks[key];
  document.title = c.title;
  let fav = document.getElementById('favicon');
  if(!fav){ fav = document.createElement('link'); fav.rel='icon'; fav.id='favicon'; document.head.appendChild(fav); }
  // Fetch to blob, then REPLACE the <link> element entirely to bust browser favicon cache
  fetch(c.icon + '?t=' + Date.now()).then(r => {
    if(!r.ok) throw new Error('404');
    return r.blob();
  }).then(blob => {
    const reader = new FileReader();
    reader.onload = () => {
      // Remove old favicon link and create a fresh one — forces browser to reload it
      const oldFav = document.getElementById('favicon');
      if(oldFav) oldFav.remove();
      const newFav = document.createElement('link');
      newFav.rel = 'icon';
      newFav.id = 'favicon';
      newFav.type = 'image/png';
      newFav.href = reader.result;
      document.head.appendChild(newFav);
    };
    reader.readAsDataURL(blob);
  }).catch(() => {
    // Remote icon failed — keep whatever is currently set
  });
  document.querySelectorAll('.cloak-card').forEach(el=>el.classList.remove('active'));
  const card = document.getElementById('cloak-' + key);
  if(card) card.classList.add('active');
  selectedCloak = key;
}

function openSettings(){ document.getElementById('settingsOverlay').classList.add('open'); buildBgGrid(); }
function closeSettings(){ document.getElementById('settingsOverlay').classList.remove('open'); }

const topBar = document.getElementById('topBar');
let lastScroll = 0;
window.addEventListener('scroll', () => {
  const y = window.scrollY;
  topBar.classList.toggle('hidden', y > 120 && y > lastScroll);
  lastScroll = y;
});

function renderGames(list){
  const container = document.getElementById('container');
  container.innerHTML = '';
  if(list.length === 0){
    container.innerHTML = '<p style="color:#c4b5fd;font-family:\'Amatic SC\',cursive;font-size:1.5rem;grid-column:1/-1;">No games found</p>';
    return;
  }
  list.forEach(game => {
    const item = document.createElement('div');
    item.className = 'zone-item';
    item.onclick = () => openGame(game.filename);
    const btn = document.createElement('button');
    btn.textContent = game.displayName;
    item.appendChild(btn);
    container.appendChild(item);
  });
}

function filterGames(){
  const q = document.getElementById('searchBar').value.toLowerCase().trim();
  filteredGames = q ? allGames.filter(g => g.displayName.toLowerCase().includes(q)) : [...allGames];
  renderGames(filteredGames);
}

async function openGame(filename){
  const normalized = normalizeFileName(filename);
  const encoded = encodeURIComponent(normalized);
  const url = __resolveAssetRoot() + encoded + '?t=' + Date.now();

  try {
    const r = await fetch(url);
    const html = await r.text();
    const zoneFrame = document.getElementById('zoneFrame');
    zoneFrame.srcdoc = html;
    document.getElementById('zoneViewer').style.display = 'flex';
    document.getElementById('zoneName').textContent = formatGameName(filename);
  } catch(e) {
    alert('Failed to load game. Please try again.');
  }
}

function closeZone(){
  document.getElementById('zoneViewer').style.display = 'none';
  document.getElementById('zoneFrame').srcdoc = '';
}

function fullscreenZone(){
  const frame = document.getElementById('zoneFrame');
  frame.requestFullscreen && frame.requestFullscreen();
}

function aboutBlank(){
  const w = window.open('about:blank');
  w.document.write(document.getElementById('zoneFrame').srcdoc);
  w.document.close();
}

function fullscreenProxy(){
  document.getElementById('proxyFrame').requestFullscreen && document.getElementById('proxyFrame').requestFullscreen();
}
function openProxyBlank(){
  window.open('https://harshsmellsliketoes.fundacioncidea.org.ar/', '_blank');
}

renderGames(allGames);
window.addEventListener('load', initBackground);
</script>
</body>
